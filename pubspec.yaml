name: wishcraft
description: AI-powered wish card creator
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'
  flutter: '>=3.13.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^12.1.3

  # Firebase
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.4
  cloud_firestore: ^4.15.4
  firebase_storage: ^11.6.6
  cloud_functions: ^4.6.4
  firebase_app_check: ^0.2.1+15
  google_sign_in: ^6.2.1

  # Local cache
  shared_preferences: ^2.2.2

  # Image & PDF Export
  screenshot: ^2.1.0
  pdf: ^3.10.7
  printing: ^5.12.0
  image: ^4.1.7
  path_provider: ^2.1.2
  saver_gallery: ^3.0.6

  # Sharing
  share_plus: ^7.2.1

  # UI & Animation
  lottie: ^3.0.0
  flutter_animate: ^4.3.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  smooth_page_indicator: ^1.1.0
  flutter_colorpicker: ^1.0.3
  google_fonts: ^6.2.1

  # Utilities
  uuid: ^4.3.3
  intl: ^0.18.1
  permission_handler: ^11.2.0
  url_launcher: ^6.2.4
  equatable: ^2.0.5
  dartz: ^0.10.1
  freezed_annotation: ^2.4.1

  # AI
  google_generative_ai: ^0.4.3
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.7
  freezed: ^2.4.6
  riverpod_generator: ^2.3.9
  json_serializable: ^6.7.1
  flutter_lints: ^3.0.1
  mockito: ^5.4.4
  fake_cloud_firestore: ^2.4.9
  firebase_auth_mocks: ^0.13.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/templates/fathers_day/
    - assets/images/templates/mothers_day/
    - assets/images/templates/birthday/
    - assets/images/templates/christmas/
    - assets/images/templates/eid/
    - assets/images/templates/general/
    - assets/images/stickers/hearts/
    - assets/images/stickers/flowers/
    - assets/images/stickers/stars/
    - assets/images/stickers/balloons/
    - assets/images/stickers/confetti/
    - assets/images/onboarding/
    - assets/icons/
    - assets/lottie/
